name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (copy static files to dist/)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `project create` is idempotent across runs: first run creates the
          # Pages project, later runs hit "already exists" and are skipped.
          # The real deploy below surfaces any auth/config errors.
          preCommands: |
            wrangler pages project create fleetmool-landing --production-branch=main || true
          command: pages deploy dist --project-name=fleetmool-landing --branch=main
